# NovaPay Helm Chart — Base Values
# Same artefact, different config principle
# Override per environment with values-{env}.yaml

replicaCount: 2

image:
  repository: artifactory.novapay.internal/novapay-app
  pullPolicy: IfNotPresent
  tag: ""  # Set by CI pipeline: --set image.tag=<semver>

imagePullSecrets:
  - name: artifactory-registry-credentials

nameOverride: ""
fullnameOverride: "novapay-app"

serviceAccount:
  create: true
  name: "novapay-app"
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set per environment

podAnnotations:
  novapay/audit-log-enabled: "true"    # PCI-DSS 10.2
  novapay/audit-logging: "true"        # RBI 6.1
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "novapay-app"
  vault.hashicorp.com/agent-inject-secret-database: "secret/novapay/database"

podSecurityContext:
  runAsNonRoot: true        # RBI 5.4 / OPA policy
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false   # OPA no-privileged-containers policy
  privileged: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: ["ALL"]           # Minimal capabilities

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"          # OPA resource-limits-mandatory policy
    memory: "1024Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

readinessProbe:               # PCI-DSS 6.5 / OPA policy
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1

livenessProbe:                # PCI-DSS 6.5 / OPA policy
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"          # RBI 5.4 TLS 1.3 minimum
    nginx.ingress.kubernetes.io/ssl-ciphers: "TLS_AES_256_GCM_SHA384"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "100"

app:
  profile: default
  logLevel: INFO

database:
  host: ""     # Override per environment
  port: 5432
  name: novapay

redis:
  host: ""     # Override per environment
  port: 6379

istio:
  enabled: true
  mtls: STRICT    # RBI 5.4 — mTLS mandatory in production